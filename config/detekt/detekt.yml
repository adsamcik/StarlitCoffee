# Detekt configuration — baseline setup
# All rule sets enabled via buildUponDefaultConfig; maxIssues set high
# to establish a baseline without failing the build immediately.

build:
  maxIssues: 999

complexity:
  active: true
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  CyclomaticComplexMethod:
    threshold: 20
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 25

coroutines:
  active: true

empty-blocks:
  active: true

exceptions:
  active: true

naming:
  active: true
  FunctionNaming:
    # Allow Compose @Composable PascalCase names
    ignoreAnnotated:
      - "Composable"
  TopLevelPropertyNaming:
    constantPattern: "[A-Z][A-Za-z0-9_]*"

performance:
  active: true

potential-bugs:
  active: true

style:
  active: true
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  MaxLineLength:
    maxLineLength: 140
  ReturnCount:
    max: 5
